<div class="sidebar">
  <h2 (click)="onBoardClick()">Boards</h2>
  @if (loading()) {
  <app-spinner></app-spinner>
  } @else {
  <ul class="board-list">
    @for (board of boards(); track board.id) {
        <li (click)="onBoardClick(board)">
        {{ board.name }}
        </li>
    }
  </ul>
  }
</div>
