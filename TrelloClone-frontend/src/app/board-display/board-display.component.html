@if (board()) {
    <div class="board-container">
        <div>{{ board()?.Name }}</div>
        <hr />

        <div class="column-container">
            @for (column of board()?.Columns; track column.Id) {
                <div class="column">
                    <app-column [column]="column" [boardId]="board()?.Id"></app-column>                    
                </div>
            }
        </div>
    </div>
}
